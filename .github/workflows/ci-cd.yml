name: HelixAgent Enterprise CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: helixagent-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-test:
    name: Python ${{ matrix.python-version }} Quality & Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Validate syntax
        run: python -m compileall -q api agent src tests streamlit_app.py
      - name: Run Ruff correctness checks
        run: ruff check api agent src tests streamlit_app.py --select E9,F63,F7,F82
      - name: Run unit and API tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests -v \
            --cov=api \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=pytest-results.xml
      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.python-version }}-evidence
          path: |
            coverage.xml
            pytest-results.xml
          if-no-files-found: warn

  streamlit-demo:
    name: Streamlit Deployment Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate Streamlit module import
        env:
          PYTHONPATH: .
        run: |
          python -m compileall -q streamlit_app.py
          python - <<'PY'
          import streamlit_app
          assistant = streamlit_app.get_assistant()
          response = assistant.run("Compare vectors and summarize HelixAgent.")
          assert isinstance(response, str)
          assert response.strip()
          print("Streamlit app import and HelixAgent assistant smoke test passed.")
          PY
      - name: Launch Streamlit server smoke test
        env:
          PYTHONPATH: .
        run: |
          set +e
          timeout 25s streamlit run streamlit_app.py \
            --server.headless true \
            --server.address 127.0.0.1 \
            --server.port 8501 \
            --server.fileWatcherType none \
            --browser.gatherUsageStats false
          status=$?
          if [ "$status" -eq 124 ]; then
            echo "Streamlit server stayed alive for the smoke-test window."
            exit 0
          fi
          echo "Streamlit server exited early with status ${status}."
          exit "$status"

  container:
    name: Container Build & Health Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build --pull -t helixagent:${{ github.sha }} .
      - name: Start and verify API
        run: |
          docker run -d --rm --name helixagent-ci -p 8000:8000 helixagent:${{ github.sha }}
          trap 'docker logs helixagent-ci || true; docker stop helixagent-ci >/dev/null 2>&1 || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              echo "HelixAgent container is healthy."
              exit 0
            fi
            sleep 2
          done
          echo "HelixAgent container did not become healthy in time."
          exit 1

  release-readiness:
    name: Release Readiness Contract
    if: always()
    needs: [quality-and-test, streamlit-demo, container]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify prerequisite jobs
        env:
          QUALITY_RESULT: ${{ needs.quality-and-test.result }}
          STREAMLIT_RESULT: ${{ needs.streamlit-demo.result }}
          CONTAINER_RESULT: ${{ needs.container.result }}
        run: |
          echo "Quality result: ${QUALITY_RESULT}"
          echo "Streamlit result: ${STREAMLIT_RESULT}"
          echo "Container result: ${CONTAINER_RESULT}"
          test "${QUALITY_RESULT}" = "success"
          test "${STREAMLIT_RESULT}" = "success"
          test "${CONTAINER_RESULT}" = "success"
      - name: Verify governance and deployment metadata
        run: |
          test -f README.md
          test -f LICENSE
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CHANGELOG.md
          test -f Dockerfile
          test -f streamlit_app.py
          test -f .streamlit/config.toml
          test -f .github/dependabot.yml
          test -f docs/L6_DEPLOYMENT_HYGIENE.md
          echo "HelixAgent release-readiness contract passed."
